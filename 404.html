<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Página não encontrada — WLS Engenharia</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="assets/icone_avatar.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --blue:#13284A; --deep:#0D1E3A; --gold:#C8932E; }
    * { box-sizing: border-box; margin: 0; }
    body { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px;
      font-family: Inter, "Segoe UI", system-ui, sans-serif; color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--deep)); }
    .code { font-family: Barlow, "Segoe UI", sans-serif; font-weight: 800; font-size: clamp(72px, 18vw, 150px); color: var(--gold); line-height: 1; }
    h1 { font-family: Barlow, "Segoe UI", sans-serif; font-size: clamp(22px, 4vw, 32px); margin: 8px 0 10px; }
    p { color: #cdd8ea; max-width: 46ch; margin: 0 auto 26px; line-height: 1.6; }
    a { display: inline-block; background: var(--gold); color: #1a1303; font-family: Barlow, sans-serif; font-weight: 700;
      text-decoration: none; padding: 13px 24px; border-radius: 10px; }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>O endereço que você buscou não existe ou foi movido. Volte para a página inicial da WLS Engenharia.</p>
    <a href="/">Voltar ao início</a>
  </div>
</body>
</html>
