<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Página não encontrada — WLS Engenharia</title>
  <meta name="robots" content="noindex" />
  <style>
    :root { --navy:#0D1E3A; --gold:#C8932E; --gold-soft:#E7C982; }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh; display: grid; place-items: center;
      background: var(--navy); color: #fff; text-align: center;
      font-family: "Segoe UI", system-ui, Arial, sans-serif; padding: 24px;
      background-image:
        linear-gradient(to right, rgba(231,201,130,.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(231,201,130,.06) 1px, transparent 1px);
      background-size: 56px 56px;
    }
    .code { font-family: "Consolas", ui-monospace, monospace; letter-spacing: 6px; color: var(--gold); font-size: 13px; text-transform: uppercase; }
    h1 { font-size: clamp(2rem, 6vw, 3.2rem); margin: 14px 0 10px; line-height: 1.1; }
    p { color: rgba(255,255,255,.7); max-width: 42ch; margin: 0 auto 26px; line-height: 1.6; }
    a { display: inline-block; background: var(--gold); color: #2a1f06; font-weight: 700;
        padding: 13px 24px; border-radius: 3px; text-decoration: none; }
    a:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <div>
    <p class="code">Erro 404</p>
    <h1>Página não encontrada</h1>
    <p>O endereço que você acessou não existe ou foi movido. Volte para a página inicial da WLS Engenharia.</p>
    <a href="/">Voltar ao início</a>
  </div>
</body>
</html>
